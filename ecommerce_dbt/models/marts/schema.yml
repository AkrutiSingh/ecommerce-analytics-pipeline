version: 2

models:
  - name: fct_orders
    description: "Core fact table joining orders, customers, payments and items. One row per order."
    columns:
      - name: order_id
        description: "Unique identifier for each order"
        tests:
          - unique
          - not_null
      - name: customer_id
        description: "Customer who placed the order"
        tests:
          - not_null
      - name: order_status
        description: "Current status: delivered, shipped, cancelled etc"
        tests:
          - not_null
      - name: total_payment_value
        description: "Total amount paid for the order"

  - name: monthly_revenue
    description: "Monthly aggregated revenue, order count and delivery metrics. One row per month."
    columns:
      - name: order_month
        description: "First day of the month"
        tests:
          - unique
          - not_null
      - name: total_revenue
        description: "Sum of all payments for delivered orders that month"
        tests:
          - not_null

  - name: top_products
    description: "Top 20 product categories ranked by total revenue from delivered orders."
    columns:
      - name: category
        description: "Product category name"
        tests:
          - unique
          - not_null
      - name: total_revenue
        description: "Total revenue generated by this category"
        tests:
          - not_null